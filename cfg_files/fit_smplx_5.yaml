###############################################################################
# Baseline config, v3
# Designed to run through fitter_pipeline.py with SMPLer-X betas seeded and
# frozen. Shape optimization no longer has to compensate for keypoint noise,
# so weights are re-tuned around pose/translation fitting:
#   - body_pose_prior_weights[0] raised back toward the SMPLify-X default so
#     stage 0 snaps into a plausible pose before the data term takes over.
#   - data_weights ramp up gradually (prior-dominant early, data-dominant late).
#   - maxiters raised to 60 to let L-BFGS actually converge per stage.
# shape_weights are kept for the fallback path (no SMPLer-X betas available);
# when betas are frozen they have no gradient and are effectively no-ops.
###############################################################################

# data_folder / output_folder are overridden per-sequence by fitter_pipeline.py
dataset: 'ADT'
joints_to_ign: 
  - 0
  - 3 
  - 13
  - 14
  - 15
  - 16
  - 17
  - 18
  - 19
  - 20

data_folder: "samples/Apartment_release_decoration_skeleton_seq131_M1292"
output_folder: "../data/adt_dataset/adt_sequences"
prior_folder: 'priors'
model_folder: 'models'
result_folder: 'results'
gender: "neutral"
model_type: 'smplx'

# GPU / dtype
use_cuda: True
gpu_id: 1
float_dtype: "float32"

# Triangulated 3D keypoints are (x, y, z) only — no per-joint confidence
use_joints_conf: False
use_pca: True
use_hands: True
use_face: False
flat_hand_mean: False
num_gaussians: 8
body_prior_type: 'l2'
left_hand_prior_type: l2
right_hand_prior_type: l2
jaw_prior_type: 'l2'
focal_length: 5000
num_pca_comps: 12
rho: 200

# Interpenetration
interpenetration: True
df_cone_height: 0.0001
ign_part_pairs: ["9,16", "9,17", "6,16", "6,17", "1,2", "12,22"]
penalize_outside: True
max_collisions: 1280

# Optimizer — L-BFGS with line search
optim_type: 'lbfgsls'
ftol: 1e-9
gtol: 1e-9
lr: 1.5
maxiters: 60
interactive: True
visualize: False

# Five-stage weight schedule ---------------------------------------------------
# Ramp the data term up across stages. Early stages let the pose prior pull
# VPoser toward a plausible mean pose, later stages lock onto the keypoints.
data_weights:
    - 60 
    - 15 
    - 25 
    - 20
    - 30 

# Body pose prior: strong in stage 0 (SMPLify-X default), then anneal.
body_pose_prior_weights:
    - 10 
    - 5
    - 2.5
    - 2.5 
    - 1.5 

coll_loss_weights:
    - 0.3
    - 1.5
    - 2.0
    - 2.5
    - 5.0

# Ignored when betas are frozen (SMPLer-X seeding); used only in fallback path.
shape_weights:
    - 15
    - 10
    - 5
    - 4
    - 2.0

expr_weights:
    - 0.5
    - 1  
    - 2  
    - 4  
    - 8  

hand_pose_prior_weights:
    - 10
    - 5
    - 1
    - 0.4
    - 0.1

jaw_pose_prior_weights:
    - 20,20,20
    - 10,10,10
    - 5,5,5
    - 2.5,2.5,2.5
    - 1,1,1

hand_joints_weights:
    - 10
    - 3.8
    - 4.0
    - 8.0
    - 10.0

face_joints_weights:
    - 10
    - 8
    - 1.0
    - 2.0
    - 10.0

arm_joints_weights:
    - 15
    - 3
    - 1.5
    - 7
    - 12

silhouette_weights:
    - 5          
    - 3         
    - 5        
    - 10         
    - 20      

# VPoser
use_vposer: True
vposer_ckpt: "vposer_v1_0"
