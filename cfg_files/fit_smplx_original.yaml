dataset: 'ADT'  
joints_to_ign:
    - 1 
    - 2
    - 9 
    - 4
    - 7
    - 60
    - 5 
    - 8
    - 63
data_folder: "samples/Apartment_release_decoration_skeleton_seq131_M1292"
output_folder: "../data/adt_dataset/adt_sequences"    # 'output_folder'
prior_folder: 'priors'
model_folder: 'models'
result_folder: 'results'
gender: "neutral"
model_type: 'smplx'
# Flag for using the GPU
use_cuda: True
gpu_id: 1
float_dtype: "float32"
use_joints_conf: False
use_pca: True
use_hands: True
use_face: False   # True
flat_hand_mean: False
# The number of mixture components for the pose prior
num_gaussians: 8
body_prior_type: 'l2'
left_hand_prior_type: l2
right_hand_prior_type: l2
jaw_prior_type: 'l2'
focal_length: 5000
num_pca_comps: 12
# The constant for the robust loss function
rho: 100
interpenetration: True
df_cone_height: 0.0001
# Upper arms and Spine 2
# Neck and jaw
ign_part_pairs: ["9,16", "9,17", "6,16", "6,17", "1,2", "12,22"]
penalize_outside: True
max_collisions: 1280   # 128
# LBFGS with line search
optim_type: 'lbfgsls'
ftol: 1e-9
gtol: 1e-9
lr: 1.0
# Max number of optimization iterations
maxiters: 30   # 30
interactive: True
visualize: False
# Relative change in loss value
data_weights:
    - 50  # 20
    - 50  # 20
    - 50  # 20
    - 50 # 20
    - 50  # 20
body_pose_prior_weights:
    - 4.04e1  # 4.04e2
    - 4.04e1  # 4.04e2
    - 57.4e-1  # 57.4e0
    - 4.78e-1 # 4.78e0
    - 4.78e-1  # 4.78e0
coll_loss_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.01
    - 1.0
shape_weights:
    - 1.0e2
    - 5.0e1
    - 1.0e1
    - 0.5e1
    - 0.5e1
expr_weights:
    - 1.0e2
    - 5.0e1
    - 1.0e1
    - 0.5e1
    - 0.5e1
hand_pose_prior_weights:
    - 4.04e1  # 4.04e2
    - 4.04e1  # 4.04e2
    - 57.4e-1  # 57.4
    - 4.78e-1  # 4.78
    - 4.78e-1  # 4.78
jaw_pose_prior_weights:
    # First phase
    - 4.04e03,4.04e04,4.04e04
    # Second phase
    - 4.04e03,4.04e04,4.04e04
    # Third phase
    - 574,5740,5740
    # Fourth phase
    - 47.8,478,478
    # Fifth phase
    - 47.8,478,478
hand_joints_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.1
    - 2.0
face_joints_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.0
    - 2.0

# Fast tracking mode (frames > 0): Adam on upper body only, frozen lower body & pelvis
tracking_iters: 50
tracking_lr: 0.02

temporal_weights:
    - 5.0   # stage 1
    - 5.0   # stage 2
    - 5.0   # stage 3
    - 5.0   # stage 4
    - 5.0   # stage 5

use_vposer: True
vposer_ckpt: "vposer_v1_0"

# ---- Silhouette term (optional) ----
# Per-stage weights. Set all to 0.0 to disable.
silhouette_weights:
    - 3.0    # stage 1: light pull — joint loss dominates (~40k vs ~50 sil max)
    - 5.0    # stage 2
    - 8.0    # stage 3
    - 10.0   # stage 4
    - 10.0   # stage 5

# Maps calibration file stem → logical camera name (used by fitter_pipeline.py).
cam_map:
    GC: GB
    HC: GF
    Z1: FC1
    Z2: FC2
    N1: HA1
    N2: HA2

# Image dimensions [H, W] for all cameras.
camera_image_size: [720, 1280]
